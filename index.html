
<!DOCTYPE html>
<html lang='id'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Album Untuk Manha</title>
  <link href='https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Gochi+Hand&family=Nunito:wght@400;600;700&display=swap' rel='stylesheet'>
  <style>
    :root {
      --bg-color: #fcf9f2;
      --binder-color: #e8e2d6;
      --accent-color: #8c7365;
      --paper-white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Nunito', sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(#dcd5c9 0.5px, transparent 0.5px); background-size: 20px 20px;
      color: #4a443f; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
    }
    .album-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .binder-book {
      position: relative; width: 100%; height: 750px; background: var(--binder-color);
      border-radius: 15px; box-shadow: 20px 20px 60px rgba(0,0,0,0.15), inset 2px 2px 5px rgba(255,255,255,0.5);
      display: flex; padding: 15px; overflow: hidden;
    }
    .spine-rings { position: absolute; left: 50%; top: 0; bottom: 0; width: 40px; transform: translateX(-50%); display: flex; flex-direction: column; justify-content: space-around; align-items: center; z-index: 10; padding: 20px 0; }
    .ring { width: 50px; height: 12px; background: linear-gradient(90deg, #999, #ddd, #999); border-radius: 10px; box-shadow: 0 4px 5px rgba(0,0,0,0.2); }
    .page-left, .page-right { 
      flex: 1; background: var(--paper-white); margin: 5px; border-radius: 5px; 
      position: relative; padding: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.05); 
      overflow-y: auto; transition: opacity 0.4s ease; 
    }
    .fade-out { opacity: 0; }
    .cover-page { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: #fffaf0; }
    .cover-title { font-family: 'Kalam', cursive; font-size: 3rem; color: var(--accent-color); margin: 0; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }

    .photo-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
      gap: 15px; width: 100%; padding: 10px 0; 
    }
    .photo-frame {
        background: #fff; padding: 8px 8px 25px 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        position: relative; width: 100%;
        border: 1px solid #eee;
    }
    .photo-frame img { 
      width: 100%; 
      height: 180px; 
      object-fit: contain; /* Memastikan foto tidak terpotong */
      background: #fdfdfd;
      display: block; 
    }
    .caption-sticker { 
      position: absolute; bottom: 5px; left: 0; right: 0; 
      font-family: 'Gochi Hand', cursive; font-size: 0.85rem; 
      color: #888; text-align: center; 
    }

    .note-section { 
      margin-top: 20px; font-family: 'Kalam', cursive; 
      line-height: 1.6; font-size: 1.2rem; color: #554; 
      background: #fdfaf3; padding: 15px; border-left: 3px solid var(--accent-color);
    }
    .date-tag { font-family: 'Nunito', sans-serif; font-weight: bold; color: #b5a48b; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
    .nav-controls { display: flex; gap: 20px; margin-top: 10px; }
    button { background: var(--accent-color); color: white; border: none; padding: 10px 25px; border-radius: 20px; font-family: 'Kalam', cursive; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    button:hover { background: #765f52; }
    
    @media (max-width: 768px) { 
      .binder-book { flex-direction: column; height: auto; } 
      .spine-rings { display: none; } 
      .photo-grid { grid-template-columns: 1fr 1fr; } 
    }
  </style>
</head>
<body>

      <div class='page-left' id='leftContent'></div>

    <div class='nav-controls'>

            right.classList.add('fade-out');
            setTimeout(() => { currentIndex = newIndex; updatePages(); }, 400);
        }
    }
